<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sweet Dreams</title>
    <script src="emailjs-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 0;
            color: #fff;
            -webkit-font-smoothing: antialiased;
            -webkit-touch-callout: none;
        }

        .navbar {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(30px);
            padding: 16px 16px;
            border-radius: 0;
            margin-bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: none;
            border-bottom: 1px solid rgba(251, 191, 36, 0.1);
            flex-wrap: nowrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            color: #fbbf24;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .nav-links {
            display: none;
            gap: 8px;
            align-items: center;
        }

        .nav-links a {
            color: #999;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.25s ease;
        }

        .nav-links a:hover {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .nav-links a.active {
            background: #fbbf24;
            color: #0f0f0f;
        }

        @media (min-width: 768px) {
            .nav-links {
                display: flex;
            }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0f0f;
            font-weight: 700;
            cursor: pointer;
        }

        .logout-btn {
            background: #fbbf24;
            color: #0f0f0f;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                padding: 0 20px;
            }
        }

        .card {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            color: #fbbf24;
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }

        .timer-display {
            text-align: center;
            margin: 30px 0;
        }

        .timer {
            font-size: 48px;
            font-weight: 700;
            color: #fbbf24;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            animation: pulse-glow 2s ease-in-out infinite;
            letter-spacing: 4px;
            text-align: center;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
            50% { text-shadow: 0 0 40px rgba(251, 191, 36, 0.6); }
        }

        @media (max-width: 480px) {
            .timer {
                font-size: 42px;
            }
        }

        .timer-status {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .timer-badge {
            display: inline-block;
            background: #fbbf24;
            color: #0f0f0f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0f0f0f;
            box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3);
            flex: 1;
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(51, 51, 51, 0.5);
            backdrop-filter: blur(10px);
            color: #ddd;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(51, 51, 51, 0.7);
            border-color: #fbbf24;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        input[type="number"] {
            flex: 1;
            min-width: 60px;
            padding: 12px 14px;
            border: 2px solid rgba(51, 51, 51, 0.5);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            color: #fff;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.3);
            background: rgba(15, 15, 15, 0.8);
        }

        .today-record {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid #fbbf24;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            color: #fbbf24;
        }

        .today-record strong {
            color: #fbbf24;
        }

        .record-item {
            padding: 15px;
            background: #0f0f0f;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #fbbf24;
        }

        .record-item > div:first-child {
            color: #ddd;
        }

        .record-time {
            color: #fbbf24;
            font-weight: 700;
        }

        .record-date {
            color: #666;
            font-size: 12px;
        }

        .health-status {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid;
        }

        .health-status.good {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-color: #22c55e;
        }

        .health-status.warning {
            background: rgba(251, 191, 36, 0.1);
            color: #f59e0b;
            border-color: #f59e0b;
        }

        .health-status.alert {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        .health-text {
            font-weight: 600;
            margin: 10px 0;
            font-size: 16px;
        }

        .health-emoji {
            font-size: 40px;
            margin: 10px 0;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .records-list {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .records-list::-webkit-scrollbar {
            width: 6px;
        }

        .records-list::-webkit-scrollbar-track {
            background: #0f0f0f;
            border-radius: 3px;
        }

        .records-list::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }

        .empty-emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }


    </style>
</head>
<body>
    <div class="navbar">
        <h1>😴 Sweet Dreams</h1>
        <div class="nav-links">
            <a href="#" class="active" onclick="goToPage('dashboard.html')">Dashboard</a>
            <a href="#" onclick="goToPage('profile.html')">Profile</a>
            <a href="#" onclick="goToPage('weekly.html')">Weekly Report</a>
        </div>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar"></div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>



    <div class="container">
        <div class="grid">
            <!-- Sleep Timer Card -->
            <div class="card">
                <h2>Start Sleep Session</h2>
                <div class="timer-display">
                    <div class="timer-status" id="timerStatus">Ready to sleep? 🌙</div>
                    <div class="timer" id="timer">00:00:00</div>
                    <div class="form-group">
                        <label>Expected wake-up time (hours)</label>
                        <div class="input-group">
                            <input type="number" id="sleepDuration" min="1" max="12" value="8" placeholder="8">
                            <span style="display: flex; align-items: center; color: #999;">hours</span>
                        </div>
                    </div>
                </div>
                <div class="timer-controls">
                    <button class="btn btn-primary" onclick="startSleep()" id="startBtn">Start Sleep</button>
                    <button class="btn btn-secondary" onclick="stopSleep()" id="stopBtn" disabled>Stop Sleep</button>
                </div>
                <div class="today-record" id="todayRecord" style="display: none;">
                    <strong style="color: #d946a6;">Today's sleep:</strong>
                    <p id="todayTime" style="font-size: 20px; margin: 10px 0;"></p>
                    <p style="font-size: 12px; color: #999;" id="todayDate"></p>
                </div>
            </div>

            <!-- Health Status Card -->
            <div class="card">
                <h2>Health Status</h2>
                <div class="health-status good" id="healthStatus">
                    <div class="health-emoji">😊</div>
                    <p class="health-text">You're sleeping well!</p>
                    <p style="font-size: 13px;">Keep maintaining good sleep habits</p>
                </div>
            </div>
        </div>

        <!-- Recent Records Card -->
        <div class="card full-width">
            <h2>Today's Sleep Records</h2>
            <div class="records-list" id="recordsList">
                <div class="empty-state">
                    <div class="empty-emoji">😴</div>
                    <p>No sleep records yet. Start your first sleep session!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;
        let startTime = null;
        let isSleeping = false;
        let currentUser = null;
        let todaySleepData = {
            sessions: [],
            totalSeconds: 0
        };

        function initDashboard() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = JSON.parse(userStr);
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

            // Load today's records
            loadTodayRecords();
            updateHealthStatus();

            // Check if timer was running
            const timerData = localStorage.getItem('sleepTimer_' + currentUser.uid);
            if (timerData) {
                const data = JSON.parse(timerData);
                if (data.isRunning) {
                    startTime = new Date(data.startTime);
                    isSleeping = true;
                    startTimerDisplay();
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('timerStatus').textContent = '⏱️ Sleep in progress...';
                }
            }
        }

        function startSleep() {
            const duration = parseInt(document.getElementById('sleepDuration').value);
            if (!duration || duration < 1 || duration > 12) {
                alert('Please enter a valid sleep duration (1-12 hours)');
                return;
            }

            isSleeping = true;
            startTime = new Date();
            const timerState = {
                startTime: startTime.toISOString(),
                expectedDuration: duration,
                isRunning: true
            };
            localStorage.setItem('sleepTimer_' + currentUser.uid, JSON.stringify(timerState));

            startTimerDisplay();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('timerStatus').innerHTML = '💤 <span class="timer-badge">SLEEPING NOW</span>';
            
            // Send email alert via EmailJS
            sleepEmailService.sendSleepStartEmail(currentUser.name, startTime);
        }

        function startTimerDisplay() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (startTime && isSleeping) {
                    const elapsed = new Date() - startTime;
                    const hours = Math.floor(elapsed / 3600000);
                    const minutes = Math.floor((elapsed % 3600000) / 60000);
                    const seconds = Math.floor((elapsed % 60000) / 1000);
                    
                    const timeStr = String(hours).padStart(2, '0') + ':' + 
                                   String(minutes).padStart(2, '0') + ':' + 
                                   String(seconds).padStart(2, '0');
                    document.getElementById('timer').textContent = timeStr;
                }
            }, 1000);
        }

        function stopSleep() {
            if (!startTime || !isSleeping) return;

            const endTime = new Date();
            const sleepSeconds = (endTime - startTime) / 1000;
            const hours = (sleepSeconds / 3600).toFixed(2);

            // Add record
            const today = new Date().toLocaleDateString();
            todaySleepData.sessions.push({
                date: today,
                startTime: startTime.toLocaleTimeString(),
                endTime: endTime.toLocaleTimeString(),
                duration: hours,
                durationSeconds: sleepSeconds
            });

            todaySleepData.totalSeconds += sleepSeconds;

            // Save to localStorage
            const recordsKey = 'sleepRecords_' + currentUser.uid;
            let allRecords = JSON.parse(localStorage.getItem(recordsKey) || '[]');
            
            const existingDayIndex = allRecords.findIndex(r => r.date === today);
            if (existingDayIndex >= 0) {
                allRecords[existingDayIndex].sessions = todaySleepData.sessions;
                allRecords[existingDayIndex].totalSeconds = todaySleepData.totalSeconds;
            } else {
                allRecords.push({
                    date: today,
                    sessions: todaySleepData.sessions,
                    totalSeconds: todaySleepData.totalSeconds
                });
            }

            localStorage.setItem(recordsKey, JSON.stringify(allRecords));
            localStorage.removeItem('sleepTimer_' + currentUser.uid);

            // Send email alert via EmailJS
            sleepEmailService.sendSleepEndEmail(currentUser.name, endTime, hours, startTime);

            // Reset timer
            isSleeping = false;
            if (timerInterval) clearInterval(timerInterval);
            startTime = null;
            document.getElementById('timer').textContent = '00:00:00';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('timerStatus').innerHTML = '✨ Ready to sleep? 🌙';

            loadTodayRecords();
            updateHealthStatus();
            alert(`Awesome! She slept for ${hours} hours. Keep tracking! 😴`);
        }

        function loadTodayRecords() {
            const today = new Date().toLocaleDateString();
            const recordsKey = 'sleepRecords_' + currentUser.uid;
            const allRecords = JSON.parse(localStorage.getItem(recordsKey) || '[]');
            
            const todayRecord = allRecords.find(r => r.date === today);
            const recordsList = document.getElementById('recordsList');

            if (todayRecord && todayRecord.sessions.length > 0) {
                todaySleepData = todayRecord;
                let html = '';
                todayRecord.sessions.forEach((session, index) => {
                    const hours = (session.durationSeconds / 3600).toFixed(2);
                    html += `
                        <div class="record-item">
                            <div>
                                <div style="color: #333; font-weight: 600;">Session ${index + 1}</div>
                                <div class="record-date">${session.startTime} - ${session.endTime}</div>
                            </div>
                            <div class="record-time">${hours}h</div>
                        </div>
                    `;
                });
                recordsList.innerHTML = html;

                // Show today record summary
                const totalHours = (todayRecord.totalSeconds / 3600).toFixed(2);
                document.getElementById('todayTime').textContent = totalHours + ' hours';
                document.getElementById('todayDate').textContent = 'Updated today at ' + new Date().toLocaleTimeString();
                document.getElementById('todayRecord').style.display = 'block';
            } else {
                recordsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">😴</div>
                        <p>No sleep records yet. Start your first sleep session!</p>
                    </div>
                `;
                document.getElementById('todayRecord').style.display = 'none';
                todaySleepData = { sessions: [], totalSeconds: 0 };
            }
        }

        function updateHealthStatus() {
            const recordsKey = 'sleepRecords_' + currentUser.uid;
            const allRecords = JSON.parse(localStorage.getItem(recordsKey) || '[]');
            
            // Calculate average sleep from last 7 days
            const last7Days = allRecords.slice(-7);
            const totalSleep = last7Days.reduce((sum, record) => sum + record.totalSeconds, 0);
            const avgSleepHours = totalSleep / 7 / 3600;

            const statusEl = document.getElementById('healthStatus');
            
            if (avgSleepHours >= 7.5) {
                statusEl.className = 'health-status good';
                statusEl.innerHTML = `
                    <div class="health-emoji">😊</div>
                    <p class="health-text">You're sleeping well!</p>
                    <p style="font-size: 13px;">Average: ${avgSleepHours.toFixed(1)} hours/day. Keep it up! 💪</p>
                `;
            } else if (avgSleepHours >= 6) {
                statusEl.className = 'health-status warning';
                statusEl.innerHTML = `
                    <div class="health-emoji">😐</div>
                    <p class="health-text">Room for improvement</p>
                    <p style="font-size: 13px;">Average: ${avgSleepHours.toFixed(1)} hours/day. Try to get more rest! 😴</p>
                `;
            } else {
                statusEl.className = 'health-status alert';
                statusEl.innerHTML = `
                    <div class="health-emoji">😴</div>
                    <p class="health-text">Get more sleep!</p>
                    <p style="font-size: 13px;">Average: ${avgSleepHours.toFixed(1)} hours/day. Your body needs more rest! 🛌</p>
                `;
            }
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('sleepTimer_' + currentUser.uid);
                window.location.href = 'index.html';
            }
        }

        function goToPage(page) {
            window.location.href = page;
        }

        window.addEventListener('load', initDashboard);
        window.addEventListener('beforeunload', function() {
            if (isSleeping && startTime) {
                localStorage.setItem('sleepTimer_' + currentUser.uid, JSON.stringify({
                    isRunning: true,
                    startTime: startTime.toISOString(),
                    expectedDuration: parseInt(document.getElementById('sleepDuration').value)
                }));
            }
        });
    </script>
</body>
</html>
