<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Report - Sweet Dreams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .navbar {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.15);
            flex-wrap: wrap;
            gap: 20px;
        }

        .navbar h1 {
            color: #fbbf24;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #999;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .nav-links a.active {
            background: #fbbf24;
            color: #0f0f0f;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0f0f;
            font-weight: 700;
        }

        .logout-btn {
            background: #fbbf24;
            color: #0f0f0f;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(26, 26, 26, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(251, 191, 36, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            color: #fbbf24;
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }

        .week-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .week-btn {
            padding: 10px 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0f0f0f;
            color: #999;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .week-btn.active {
            border-color: #fbbf24;
            background: #fbbf24;
            color: #0f0f0f;
        }

        .week-btn:hover {
            border-color: #fbbf24;
            color: #fbbf24;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #0f0f0f;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-box.good {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .stat-box.warning {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
        }

        .stat-box.alert {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fbbf24;
            margin-bottom: 5px;
        }

        .stat-box.alert .stat-value {
            color: #ef4444;
        }

        .stat-box.good .stat-value {
            color: #22c55e;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .chart-container {
            margin: 25px 0;
        }

        .chart-title {
            color: #ddd;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .day-bar {
            margin: 15px 0;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .day-name {
            color: #ddd;
            font-weight: 600;
        }

        .day-time {
            color: #fbbf24;
            font-weight: 700;
        }

        .bar-container {
            background: #0f0f0f;
            border: 1px solid #333;
            height: 35px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: #0f0f0f;
            font-weight: 600;
            font-size: 12px;
            transition: width 0.3s ease;
        }

        .insight-card {
            background: #0f0f0f;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            border-left: 4px solid #fbbf24;
            border: 1px solid #333;
            border-left: 4px solid #fbbf24;
        }

        .insight-title {
            color: #fbbf24;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .insight-text {
            color: #999;
            font-size: 14px;
            line-height: 1.5;
        }

        .insight-emoji {
            font-size: 20px;
            margin-right: 10px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .empty-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            font-size: 14px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #d946a6;
            border-bottom-color: #d946a6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .sleep-times {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .sleep-time-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .sleep-time-item:last-child {
            border-bottom: none;
        }

        .time-label {
            color: #666;
        }

        .time-value {
            color: #d946a6;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>😴 Sweet Dreams</h1>
        <div class="nav-links">
            <a href="#" onclick="goToPage('dashboard.html')">Dashboard</a>
            <a href="#" onclick="goToPage('profile.html')">Profile</a>
            <a href="#" class="active" onclick="goToPage('weekly.html')">Weekly Report</a>
        </div>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar"></div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Week Selector -->
        <div class="card">
            <h2>Select Week</h2>
            <div class="week-selector" id="weekSelector"></div>
        </div>

        <!-- Summary Stats -->
        <div class="card">
            <h2>Weekly Summary</h2>
            <div class="stat-grid" id="statsGrid">
                <div class="stat-box">
                    <div class="stat-value" id="totalHours">0h</div>
                    <div class="stat-label">Total Sleep</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="avgHours">0h</div>
                    <div class="stat-label">Average/Night</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="bestNight">0h</div>
                    <div class="stat-label">Best Night</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="worstNight">0h</div>
                    <div class="stat-label">Worst Night</div>
                </div>
            </div>
        </div>

        <!-- Daily Breakdown Chart -->
        <div class="card">
            <h2>Daily Sleep Pattern</h2>
            <div class="chart-container" id="chartContainer">
                <div class="empty-state">
                    <div class="empty-emoji">📊</div>
                    <p class="empty-text">No data for this week</p>
                </div>
            </div>
        </div>

        <!-- Insights & Analysis -->
        <div class="card">
            <h2>Analysis & Insights</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('insights')">Insights</button>
                <button class="tab" onclick="switchTab('sleeptimes')">Sleep Times</button>
            </div>

            <div id="insights" class="tab-content active">
                <div id="insightsList"></div>
            </div>

            <div id="sleeptimes" class="tab-content">
                <div class="sleep-times" id="sleepTimesList"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentWeek = 0;
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function initWeekly() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = JSON.parse(userStr);
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

            generateWeekSelector();
            loadWeekData(0);
        }

        function generateWeekSelector() {
            const recordsKey = 'sleepRecords_' + currentUser.uid;
            const allRecords = JSON.parse(localStorage.getItem(recordsKey) || '[]');

            if (allRecords.length === 0) {
                document.getElementById('weekSelector').innerHTML = '<p style="color: #999;">No data available yet</p>';
                return;
            }

            const weeks = [];
            let currentWeekStart = null;

            for (let i = allRecords.length - 1; i >= 0; i--) {
                const date = new Date(allRecords[i].date);
                const dayOfWeek = date.getDay();
                const weekStart = new Date(date);
                weekStart.setDate(date.getDate() - dayOfWeek);

                const weekKey = weekStart.toDateString();
                if (!weeks.some(w => w.start.toDateString() === weekKey)) {
                    weeks.push({ start: weekStart, end: new Date(weekStart.getTime() + 6 * 24 * 60 * 60 * 1000) });
                }
            }

            let html = '';
            weeks.forEach((week, index) => {
                const label = `${week.start.toLocaleDateString()} - ${week.end.toLocaleDateString()}`;
                html += `<button class="week-btn ${index === 0 ? 'active' : ''}" onclick="loadWeekData(${index})">${label}</button>`;
            });

            document.getElementById('weekSelector').innerHTML = html;
        }

        function loadWeekData(weekIndex) {
            const recordsKey = 'sleepRecords_' + currentUser.uid;
            const allRecords = JSON.parse(localStorage.getItem(recordsKey) || '[]');

            const weeks = getWeeksList(allRecords);
            if (weekIndex >= weeks.length) return;

            currentWeek = weekIndex;
            const selectedWeek = weeks[weekIndex];

            // Update button states
            document.querySelectorAll('.week-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === weekIndex);
            });

            // Get records for this week
            const weekRecords = allRecords.filter(record => {
                const date = new Date(record.date);
                return date >= selectedWeek.start && date <= selectedWeek.end;
            });

            if (weekRecords.length === 0) {
                document.getElementById('chartContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">📊</div>
                        <p class="empty-text">No data for this week</p>
                    </div>
                `;
                resetStats();
                document.getElementById('insightsList').innerHTML = '<p style="color: #999;">No insights available</p>';
                document.getElementById('sleepTimesList').innerHTML = '<p style="color: #999;">No sleep data</p>';
                return;
            }

            updateStats(weekRecords);
            renderChart(weekRecords, selectedWeek);
            generateInsights(weekRecords);
            generateSleepTimes(weekRecords);
        }

        function getWeeksList(records) {
            const weeks = [];
            let weekMap = {};

            records.forEach(record => {
                const date = new Date(record.date);
                const dayOfWeek = date.getDay();
                const weekStart = new Date(date);
                weekStart.setDate(date.getDate() - dayOfWeek);
                const weekKey = weekStart.toDateString();

                if (!weekMap[weekKey]) {
                    weekMap[weekKey] = { start: new Date(weekStart), end: new Date(weekStart.getTime() + 6 * 24 * 60 * 60 * 1000) };
                    weeks.push(weekMap[weekKey]);
                }
            });

            return weeks.reverse();
        }

        function updateStats(weekRecords) {
            const sleepData = weekRecords.map(r => r.totalSeconds / 3600);
            const total = sleepData.reduce((a, b) => a + b, 0);
            const avg = total / sleepData.length;
            const best = Math.max(...sleepData);
            const worst = Math.min(...sleepData);

            document.getElementById('totalHours').textContent = total.toFixed(1) + 'h';
            document.getElementById('avgHours').textContent = avg.toFixed(1) + 'h';
            document.getElementById('bestNight').textContent = best.toFixed(1) + 'h';
            document.getElementById('worstNight').textContent = worst.toFixed(1) + 'h';
        }

        function resetStats() {
            document.getElementById('totalHours').textContent = '0h';
            document.getElementById('avgHours').textContent = '0h';
            document.getElementById('bestNight').textContent = '0h';
            document.getElementById('worstNight').textContent = '0h';
        }

        function renderChart(weekRecords, week) {
            let html = '';
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            for (let i = 0; i < 7; i++) {
                const date = new Date(week.start.getTime() + i * 24 * 60 * 60 * 1000);
                const record = weekRecords.find(r => r.date === date.toLocaleDateString());
                const hours = record ? (record.totalSeconds / 3600).toFixed(1) : 0;
                const percentage = record ? Math.min((record.totalSeconds / 3600 / 8) * 100, 100) : 0;

                html += `
                    <div class="day-bar">
                        <div class="day-header">
                            <span class="day-name">${dayNames[date.getDay()]} - ${date.toLocaleDateString()}</span>
                            <span class="day-time">${hours}h</span>
                        </div>
                        <div class="bar-container">
                            ${percentage > 0 ? `<div class="bar-fill" style="width: ${percentage}%"></div>` : ''}
                        </div>
                    </div>
                `;
            }

            document.getElementById('chartContainer').innerHTML = html;
        }

        function generateInsights(weekRecords) {
            const sleepData = weekRecords.map(r => r.totalSeconds / 3600);
            const avg = sleepData.reduce((a, b) => a + b, 0) / sleepData.length;
            let html = '';

            if (avg >= 7.5) {
                html += `
                    <div class="insight-card">
                        <div class="insight-title">
                            <span class="insight-emoji">😊</span> Excellent Sleep Pattern
                        </div>
                        <div class="insight-text">You've been getting ${avg.toFixed(1)} hours of sleep on average. Keep up this great habit!</div>
                    </div>
                `;
            } else if (avg >= 6) {
                html += `
                    <div class="insight-card">
                        <div class="insight-title">
                            <span class="insight-emoji">😐</span> Room for Improvement
                        </div>
                        <div class="insight-text">Your average is ${avg.toFixed(1)} hours. Try to aim for 7-8 hours per night for better health.</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="insight-card">
                        <div class="insight-title">
                            <span class="insight-emoji">😴</span> Get More Rest
                        </div>
                        <div class="insight-text">Your average is only ${avg.toFixed(1)} hours. Your body needs more rest. Try to get at least 7 hours daily.</div>
                    </div>
                `;
            }

            // Consistency insight
            const variance = Math.sqrt(sleepData.reduce((sum, val) => sum + Math.pow(val - avg, 2), 0) / sleepData.length);
            if (variance < 1) {
                html += `
                    <div class="insight-card">
                        <div class="insight-title">
                            <span class="insight-emoji">✅</span> Consistent Schedule
                        </div>
                        <div class="insight-text">Great job! Your sleep schedule is very consistent this week.</div>
                    </div>
                `;
            }

            // Best night
            const bestNight = Math.max(...sleepData);
            const bestDay = weekRecords[sleepData.indexOf(bestNight)].date;
            html += `
                <div class="insight-card">
                    <div class="insight-title">
                        <span class="insight-emoji">⭐</span> Best Night
                    </div>
                    <div class="insight-text">Your best night this week was on ${bestDay} with ${bestNight.toFixed(1)} hours of sleep.</div>
                </div>
            `;

            document.getElementById('insightsList').innerHTML = html;
        }

        function generateSleepTimes(weekRecords) {
            let html = '';

            weekRecords.forEach(record => {
                const sessions = record.sessions;
                if (sessions && sessions.length > 0) {
                    html += `<div style="margin-bottom: 20px;">
                        <div style="color: #d946a6; font-weight: 700; margin-bottom: 10px;">${record.date}</div>`;
                    
                    sessions.forEach(session => {
                        html += `
                            <div class="sleep-time-item">
                                <span class="time-label">${session.startTime} → ${session.endTime}</span>
                                <span class="time-value">${((session.durationSeconds || 0) / 3600).toFixed(1)}h</span>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                }
            });

            document.getElementById('sleepTimesList').innerHTML = html || '<p style="color: #999;">No sleep data available</p>';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }

        function goToPage(page) {
            window.location.href = page;
        }

        window.addEventListener('load', initWeekly);
    </script>
</body>
</html>
